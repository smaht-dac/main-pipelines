## Pipeline information #####################################
#     General information for the pipeline
#############################################################
name: PacBio_ONT_variant_calling_Delly_GRCh38
description: Run Delly on long-read data (PacBio and ONT). |
             Produce structural variant calls in VCF format.  |
             Accept a list of long-read input CRAM files with each file processed independently

category:
  - Variant Calling

## General arguments ########################################
#     Pipeline input, reference files, and general arguments
#       define all arguments for the pipeline here
#############################################################
input:

  # File inputs
  input_files_cram:
    argument_type: file.cram
    dimensionality: 1

  genome_reference_fasta:
    argument_type: file.fa
    files:
      - complete-reference-fasta-no-alt@GCA_000001405.15_GRCh38_no_decoy

## Workflows and dependencies ###############################
#     Information for the workflows and their dependencies
#############################################################
workflows:

  ## Workflow definition #####################
  #  delly_lr
  ############################################
  delly_lr:

    ## Specific arguments ##############
    ####################################
    input:

      # File arguments
      input_file_cram:
        argument_type: file.cram
        source_argument_name: input_files_cram
        scatter: 1

      genome_reference_fasta:
        argument_type: file.fa

    ## Output ##############################
    #     Output files for the workflow
    ########################################
    output:

      # File output
      output_file_vcf_gz:
        description: Delly long-read output VCF
        data_category:
          - Somatic Variant Calls
        data_type:
          - SV
        output_status: Final Output
        # These fields are required to link metadata for the naming
        software:
          - smaht:Software-Delly_v1.7.3
        reference_genome: GRCh38

    ## EC2 Configuration to use ########
    ####################################
    config:
      instance_type:
        - r5a.large
        - r6a.large
        - r6i.large
        - r7a.large
        - r7i.large
        - r8a.large
        - r8i.large
      ebs_size: "1.2x"
      ebs_optimized: True
      spot_instance: False
      run_name: run_delly_lr
      behavior_on_capacity_limit: wait_and_retry