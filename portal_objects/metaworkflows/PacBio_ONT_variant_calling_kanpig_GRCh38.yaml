## Pipeline information #####################################
#     General information for the pipeline
#############################################################
name: PacBio_ONT_variant_calling_kanpig_GRCh38
description: Runs kanpig to generate genomic pileups using PacBio or ONT long read data. |
             Accepts a list of input CRAM files with each file processed independently and produces | 
             a list of plup files.

category:
  - Variant Calling

## General arguments ########################################
#     Pipeline input, reference files, and general arguments
#       define all arguments for the pipeline here
#############################################################
input:

  # File inputs
  input_files_cram:
    argument_type: file.cram
    dimensionality: 1

  reference_fasta:
    argument_type: file.fa
    files:
      - complete-reference-fasta-no-alt@GCA_000001405.15_GRCh38_no_decoy

  # Optional parameter inputs
  nthreads:
    argument_type: parameter.integer
    value: 8

## Workflows and dependencies ###############################
#     Information for the workflows and their dependencies
#############################################################
workflows:

  ## Workflow definition #####################
  #  kanpig_plup
  ############################################
  kanpig_plup:

    ## Specific arguments ##############
    ####################################
    input:

      # File arguments
      input_file_cram:
        argument_type: file.cram
        source_argument_name: input_files_cram
        scatter: 1

      reference_fasta:
        argument_type: file.fa

      # Parameter arguments
      nthreads:
        argument_type: parameter.integer

    ## Output ##############################
    #     Output files for the workflow
    ########################################
    output:

      # File output
      output_file_plup_gz:
        description: kanpig output plup
        data_category:
          - Alignment Pileups
        data_type:
          - SV
        output_status: Final Output
        # These fields are required to link metadata for the naming
        software:
          - smaht:Software-kanpig_v1.1.0
        reference_genome: GRCh38

    ## EC2 Configuration to use ########
    ####################################
    config:
      instance_type: # 8 cores, 16 GiB
        - c5a.2xlarge
        - c6a.2xlarge
        - c6i.2xlarge
        - c7a.2xlarge
        - c7i.2xlarge
        - c8a.2xlarge
        - c8i.2xlarge
      ebs_size: "1.4x"
      ebs_optimized: True
      spot_instance: True 
      run_name: run_kanpig_plup
      behavior_on_capacity_limit: wait_and_retry